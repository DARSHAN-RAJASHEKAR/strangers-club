<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B2D5C" />
    <title>Join Group — Strangers Club</title>
    <link rel="stylesheet" href="../static/css/styles.css?v=cobalt-1" />
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js"
      defer
    ></script>
    
  
  <style>
    .preview-banner { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: rgba(18,34,79,0.95); border: 1px solid var(--gold); color: var(--ink);
      padding: 10px 18px; border-radius: 99px; font-family: var(--f-mono); font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase; z-index: 100; backdrop-filter: blur(12px); }
    .preview-banner span { color: var(--gold); }
  </style>
  </head>
  <body class="app-container">
    <header class="app-header">
      <div class="header-inner">
        <a href="/" class="brand-logo">Strangers Club</a>
        <nav>
          <ul class="nav-links">
            <li>
  <a href="#" id="logout-btn" class="btn btn-outline" style="padding: 8px 16px; font-size: 13px; min-height: auto;">Logout</a>
</li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="main-content"><div class="flex flex-col items-center" x-data="joinGroupForm()" x-init="init()" style="padding-top: 12px;">
  <div class="text-center mb-10" style="max-width: 600px;">
    <div class="eyebrow mb-4">Join a meet-up</div>
    <h1 class="title-xl">
      Got a <em>group code?</em>
    </h1>
    <p class="subtitle" style="margin-bottom: 0;">
      Enter the invitation code from the group owner. It'll add you to their meet-up room.
    </p>
  </div>

  <div class="card-glass max-w-md" style="margin: 0 auto;">
    <div class="flex flex-col" style="gap: 14px;">
      <div x-show="error" class="alert alert-error" role="alert">
        <span x-text="error"></span>
      </div>
      <div x-show="success" class="alert alert-success" role="alert">
        <span x-text="success"></span>
      </div>

      <form @submit.prevent="joinGroup" class="space-y-4">
        <div class="form-group">
          <label for="group_code" class="form-label">Group invitation code</label>
          <input
            type="text"
            id="group_code"
            x-model="code"
            class="form-input code-input"
            placeholder="ADMIN-A12"
            required
            autocomplete="off"
            spellcheck="false"
            style="text-transform: uppercase;"
          />
          <p class="text-xs text-muted" style="margin-top: 8px;">
            Ask the group owner for their code if you don't have one.
          </p>
        </div>

        <button type="submit" class="btn btn-primary btn-full" :disabled="loading">
          <span x-show="!loading">Join group</span>
          <span x-show="loading" class="flex items-center" style="gap: 8px;">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Joining…
          </span>
        </button>
      </form>

      <div class="border-t pt-4 text-center" style="margin-top: 4px;">
        <a href="/app" class="text-sm text-primary" style="font-weight: 500;">← Back to dashboard</a>
      </div>
    </div>
  </div>
</div>

<script>
  function joinGroupForm() {
    return {
      token: localStorage.getItem("token"),
      code: "",
      loading: false,
      error: "",
      success: "",

      init() {
        if (!this.token) {
          window.location.href = "/login";
        }
        document.getElementById("logout-btn").addEventListener("click", (e) => {
          e.preventDefault();
          this.logout();
        });
      },

      async joinGroup() {
        this.loading = true;
        this.error = "";
        this.success = "";

        try {
          const response = await fetch("/api/v1/auth/join-group", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${this.token}`,
            },
            body: JSON.stringify({ code: this.code }),
          });

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.detail || "Failed to join group");
          }

          const data = await response.json();
          this.success = data.message + " Redirecting to dashboard…";

          setTimeout(() => { window.location.href = "/app"; }, 2000);
        } catch (error) {
          this.error = error.message || "An unexpected error occurred";
        } finally {
          this.loading = false;
        }
      },

      logout() {
        localStorage.removeItem("token");
        window.location.href = "/login";
      },
    };
  }
</script></main>

    <footer class="app-footer">
      &copy; <span id="current-year"></span> · est. mmxxv · invite only
    </footer>

    <script>
      document.getElementById("current-year").textContent = new Date().getFullYear();
    </script>
    
  <div class="preview-banner">live preview · <span>stub data, no backend</span></div>
</body>
</html>
