<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Strangers Club{% endblock %}</title>
    <link
      rel="stylesheet"
      href="/static/css/styles.css?v=3"
    />
    <!-- Removed Tailwind CDN for custom premium UI -->
    <!-- The 'defer' attribute is critical. It ensures this script runs after the page is loaded. -->
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js"
      defer
    ></script>
    {% block extra_css %}{% endblock %}
  </head>
  <body class="app-container">
    <header class="app-header">
      <div class="header-inner" style="display: flex; align-items: center; justify-content: space-between; position: relative;">
        <!-- Left spacer to balance flexbox -->
        <div style="flex: 1;"></div>
        
        <!-- Center Logo -->
        <div style="display: flex; justify-content: center; flex: 1;">
          <a href="/" class="brand-logo">Strangers Club</a>
        </div>
        
        <!-- Right Navigation -->
        <nav style="flex: 1; display: flex; justify-content: flex-end;">
          <ul class="nav-links">
            {% block nav_links %}
            {% endblock %}
          </ul>
        </nav>
      </div>
    </header>

    <main class="main-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
      <div class="container mx-auto px-4">
        <p>
          &copy; <span id="current-year"></span> Strangers Club. All rights
          reserved.
        </p>
      </div>
    </footer>

    <script>
      document.getElementById("current-year").textContent =
        new Date().getFullYear();
    </script>
    <!-- Your page-specific JavaScript will go here -->
    {% block extra_js %}{% endblock %}
  </body>
</html>
