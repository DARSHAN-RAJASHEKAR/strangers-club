<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1B2D5C" />
    <title>{% block title %}Strangers Club{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=cobalt-1" />
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js"
      defer
    ></script>
    {% block extra_css %}{% endblock %}
  </head>
  <body class="app-container">
    <header class="app-header">
      <div class="header-inner">
        <a href="/" class="brand-logo">Strangers Club</a>
        <nav>
          <ul class="nav-links">
            {% block nav_links %}{% endblock %}
          </ul>
        </nav>
      </div>
    </header>

    <main class="main-content">{% block content %}{% endblock %}</main>

    <footer class="app-footer">
      &copy; <span id="current-year"></span> · est. mmxxv · invite only
    </footer>

    <script>
      document.getElementById("current-year").textContent = new Date().getFullYear();
    </script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
