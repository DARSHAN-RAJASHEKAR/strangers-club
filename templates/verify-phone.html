{% extends "base.html" %}
{% block title %}Verify your number — Strangers Club{% endblock %}

{% block content %}
<div class="stage" x-data="phoneVerification()">
  <div class="stage-inner">

    <!-- Top bar -->
    <div class="top-meta">
      <span class="mono-meta">step 03 of 03</span>
      <a href="/logout" class="mono-meta" style="margin-left: auto; color: var(--muted);">logout</a>
    </div>

    <!-- ─── Step 1: Enter number ─── -->
    <template x-if="step === 'phone'">
      <div>
        <div class="eyebrow mb-3">one more thing</div>
        <h1 class="title-lg">
          We send the code<br />
          <span class="italic-accent">by WhatsApp.</span>
        </h1>
        <p class="text-sm" style="color: var(--ink-2); max-width: 340px; margin-top: 14px;">
          We use your phone number only to confirm you're a real person,
          and to recover your account. Never shared.
        </p>

        <div x-show="error" class="alert alert-error" role="alert" style="margin-top: 18px;">
          <span x-text="error"></span>
        </div>

        <form @submit.prevent="sendCode" style="margin-top: 30px;">
          <div class="form-group">
            <label class="form-label">whatsapp number</label>
            <div class="phone-input">
              <span class="phone-input__cc">
                <span class="phone-input__flag">🇮🇳</span>
                <span>+91</span>
              </span>
              <input
                type="tel"
                x-model="phone"
                placeholder="98201 47723"
                autocomplete="tel"
                :required="!isDemo"
              />
            </div>
          </div>

          <!-- Demo: show the assigned number + paste button -->
          <div x-show="isDemo && demoPhone" class="hint-card" style="justify-content: space-between; align-items: center;">
            <div>
              <div class="form-label" style="margin-bottom: 4px;">your demo number</div>
              <div style="font-size: 22px; letter-spacing: 0.15em; color: var(--gold); font-weight: 600; font-family: var(--font-mono);"
                x-text="demoPhone.slice(0,5) + '-' + demoPhone.slice(5)"></div>
            </div>
            <button
              type="button"
              @click="phone = demoPhone"
              style="background: none; border: 1px solid var(--gold); color: var(--gold); font-size: 13px; padding: 6px 14px; border-radius: 4px; cursor: pointer; white-space: nowrap; font-family: var(--font-mono);"
            >Use This</button>
          </div>

          <!-- Real users: WhatsApp hint -->
          <div x-show="!isDemo" class="hint-card">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12c0 1.76.46 3.41 1.25 4.84L2 22l5.27-1.38A9.92 9.92 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm5.05 14.34c-.21.59-1.23 1.11-1.7 1.18-.43.06-.97.09-1.57-.1-.36-.11-.83-.27-1.43-.52-2.51-1.08-4.15-3.6-4.27-3.77-.13-.17-1.03-1.37-1.03-2.61 0-1.24.65-1.85.88-2.1.23-.25.5-.31.67-.31h.48c.15 0 .36-.06.56.43.21.51.71 1.76.78 1.89.06.13.1.28.02.45-.08.17-.13.27-.25.42-.13.15-.27.34-.39.45-.13.13-.26.27-.11.52.15.25.66 1.09 1.42 1.77.98.87 1.8 1.14 2.05 1.27.25.13.39.11.54-.06.15-.17.62-.72.78-.97.16-.25.33-.21.54-.13.21.08 1.37.64 1.6.76.23.13.39.19.45.29.06.1.06.6-.15 1.19z"/>
            </svg>
            <span>We'll text a 6-digit code on WhatsApp.</span>
          </div>

          <div style="margin-top: 28px;">
            <svg class="star-ornament" viewBox="0 0 42 10" aria-hidden="true">
              <path d="M0 5 H16" stroke="var(--gold)" stroke-width="0.7" />
              <path d="M26 5 H42" stroke="var(--gold)" stroke-width="0.7" />
              <path d="M21 0.5 L22 4 L25 5 L22 6 L21 9.5 L20 6 L17 5 L20 4 Z" fill="var(--gold)" />
            </svg>
            <div style="margin-top: 12px; text-align: center;">
              <span
                @click="deleteAccount()"
                style="font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; text-underline-offset: 3px;"
              >Delete Account</span>
            </div>
          </div>

          <div style="flex: 1; min-height: 32px;"></div>

          <!-- Submit: same button for everyone -->
          <button
            type="submit"
            class="btn btn-primary btn-full"
            :disabled="loading || !phone"
            style="margin-top: 32px;"
          >
            <span x-show="!loading">Continue</span>
            <span x-show="loading">Checking…</span>
          </button>
        </form>
      </div>
    </template>

    <!-- ─── Step 2: Enter OTP ─── -->
    <template x-if="step === 'otp'">
      <div>
        <div class="eyebrow mb-3">check your whatsapp</div>
        <h1 class="title-lg">
          Enter the code<br />
          <span class="italic-accent">we just sent.</span>
        </h1>
        <p class="text-sm" style="color: var(--ink-2); max-width: 340px; margin-top: 14px;">
          Sent to <strong x-text="'+91 ' + phone"></strong>.
          <span class="link" @click="step = 'phone'" style="cursor:pointer;">change</span>
        </p>

        <div x-show="error" class="alert alert-error" role="alert" style="margin-top: 18px;">
          <span x-text="error"></span>
        </div>

        <form @submit.prevent="verifyCode" style="margin-top: 30px;">
          <div class="form-label" style="margin-bottom: 10px;">verification code</div>
          <div class="otp-grid">
            <template x-for="i in 6" :key="i">
              <input
                type="text"
                maxlength="1"
                inputmode="numeric"
                autocomplete="one-time-code"
                x-model="otp[i-1]"
                @input="onOtpInput($event, i-1)"
                @keydown="onOtpKey($event, i-1)"
                @paste="onOtpPaste($event)"
                :ref="`otp${i-1}`"
              />
            </template>
          </div>

          <!-- Demo OTP hint -->
          <div x-show="isDemo && demoOtp" class="hint-card" style="margin-top: 18px; justify-content: space-between; align-items: center;">
            <div>
              <div class="form-label" style="margin-bottom: 4px;">your demo otp</div>
              <div x-text="demoOtp" style="font-size: 22px; letter-spacing: 0.15em; color: var(--gold); font-weight: 600; font-family: var(--font-mono);"></div>
            </div>
            <button
              type="button"
              @click="pasteDemoOtp()"
              style="background: none; border: 1px solid var(--gold); color: var(--gold); font-size: 13px; padding: 6px 14px; border-radius: 4px; cursor: pointer; white-space: nowrap; font-family: var(--font-mono);"
            >Use This</button>
          </div>

          <div x-show="!isDemo" style="margin-top: 16px;">
            <span class="text-sm text-muted">Didn't get it?</span>
            <span class="link link-accent" @click="resendCode" style="cursor:pointer; margin-left: 6px;">resend</span>
          </div>

          <div style="flex: 1; min-height: 32px;"></div>

          <button
            type="submit"
            class="btn btn-primary btn-full"
            :disabled="loading || otp.join('').length < 6"
            style="margin-top: 32px;"
          >
            <span x-show="!loading">Verify &amp; continue</span>
            <span x-show="loading">Verifying…</span>
          </button>
        </form>

      </div>
    </template>

  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function phoneVerification() {
    return {
      step: "phone",
      phone: "",
      otp: ["", "", "", "", "", ""],
      loading: false,
      error: "",
      token: "{{ token }}" || localStorage.getItem("token"),
      isDemo: localStorage.getItem("is_demo") === "1",
      demoPhone: localStorage.getItem("demo_phone") || "",
      demoOtp: "",


      async deleteAccount() {
        if (!confirm("This will permanently delete your account and cancel your invite. Are you sure?")) return;
        try {
          await fetch("/api/v1/auth/account", {
            method: "DELETE",
            headers: { Authorization: `Bearer ${this.token}` },
          });
        } catch (_) {}
        localStorage.removeItem("token");
        window.location.href = "/logout";
      },

      onOtpInput(e, idx) {
        const v = e.target.value.replace(/[^0-9]/g, "");
        this.otp[idx] = v.slice(0, 1);
        e.target.value = this.otp[idx];
        if (v && idx < 5) {
          const n = this.$refs[`otp${idx+1}`];
          if (n) n.focus();
        }
      },
      onOtpKey(e, idx) {
        if (e.key === "Backspace" && !this.otp[idx] && idx > 0) {
          const p = this.$refs[`otp${idx-1}`];
          if (p) p.focus();
        }
      },
      onOtpPaste(e) {
        const text = (e.clipboardData || window.clipboardData)
          .getData("text").replace(/[^0-9]/g, "").slice(0, 6);
        if (!text) return;
        e.preventDefault();
        for (let i = 0; i < 6; i++) this.otp[i] = text[i] || "";
        const f = Math.min(text.length, 5);
        const c = this.$refs[`otp${f}`];
        if (c) c.focus();
      },

      async sendCode() {
        if (!this.phone) return;

        // Demo: validate entered number matches the assigned demo phone
        if (this.isDemo && this.demoPhone) {
          const entered = this.phone.replace(/\s+/g, "");
          if (entered !== this.demoPhone) {
            this.error = "Enter the number shown above.";
            return;
          }
          // Match — generate a demo OTP and go to OTP step
          this.demoOtp = String(Math.floor(100000 + Math.random() * 900000));
          this.error = "";
          this.step = "otp";
          return;
        }

        // Real users: send WhatsApp OTP
        this.loading = true;
        this.error = "";
        try {
          const r = await fetch("/api/v1/auth/send-otp", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${this.token}`,
            },
            body: JSON.stringify({ phone: "+91" + this.phone.replace(/\s+/g, "") }),
          });
          if (!r.ok) {
            const d = await r.json().catch(() => ({}));
            throw new Error(d.detail || "Couldn't send code.");
          }
          this.step = "otp";
          this.$nextTick(() => {
            const c = this.$refs.otp0;
            if (c) c.focus();
          });
        } catch (err) {
          this.error = err.message;
        } finally {
          this.loading = false;
        }
      },

      pasteDemoOtp() {
        const digits = this.demoOtp.split("");
        this.otp = digits.slice(0, 6);
        this.$nextTick(() => {
          const inputs = document.querySelectorAll(".otp-grid input");
          inputs.forEach((inp, i) => { if (inp) inp.value = this.otp[i] || ""; });
        });
      },

      async resendCode() {
        this.error = "";
        await this.sendCode();
      },

      async verifyCode() {
        const code = this.otp.join("");
        if (code.length < 6) return;

        // Demo: validate entered OTP matches the generated demo OTP
        if (this.isDemo && this.demoOtp) {
          if (code !== this.demoOtp) {
            this.error = "Enter the code shown above.";
            return;
          }
          // Match — mark phone verified
          this.loading = true;
          this.error = "";
          try {
            const r = await fetch("/api/v1/auth/demo-verify-phone", {
              method: "POST",
              headers: { Authorization: `Bearer ${this.token}` },
            });
            if (!r.ok) {
              const d = await r.json().catch(() => ({}));
              throw new Error(d.detail || "Couldn't verify.");
            }
            const data = await r.json();
            if (data.token) { localStorage.setItem("token", data.token); this.token = data.token; }
            window.location.href = data.redirect || "/app";
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
          return;
        }

        // Real users: verify against backend
        this.loading = true;
        this.error = "";
        try {
          const r = await fetch("/api/v1/auth/verify-otp", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${this.token}`,
            },
            body: JSON.stringify({
              phone: "+91" + this.phone.replace(/\s+/g, ""),
              code: code,
            }),
          });
          if (!r.ok) {
            const d = await r.json().catch(() => ({}));
            throw new Error(d.detail || "Code didn't match.");
          }
          const data = await r.json();
          if (data.token) localStorage.setItem("token", data.token);
          window.location.href = data.redirect || "/app";
        } catch (err) {
          this.error = err.message;
        } finally {
          this.loading = false;
        }
      },
    };
  }
</script>
{% endblock %}
